; ============================================================
; MeshCore + LVGL UI for CrowPanel DHE04005D
; ESP32-P4 + 5" 800x480 RGB IPS panel + GT911 touch + SX1262
; ============================================================

[platformio]
default_envs = dhe04005d-5inch-P4-meshcore


; ============================================================
; CrowPanel DHE04005D (ESP32-P4 + 5" 800x480 RGB)
; ------------------------------------------------------------
; ESP32-P4 requires the pioarduino fork of platform-espressif32 —
; stock Espressif 6.x does not support P4 yet.
; ============================================================

[esp32p4_base]
; Bumped from 54.03.20 (arduino-esp32 3.2) to 55.03.38-1 (arduino-esp32 3.3.2) to get
; WiFi.setPins() for the custom ESP-Hosted SDIO pin mapping that CrowPanel uses.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
framework = arduino
board = esp32-p4-evboard

upload_speed = 921600
monitor_speed = 115200

board_build.flash_mode = qio
board_build.f_flash = 80000000
board_upload.flash_size = 16MB
; Plain filename in project root (see partitions_p4.csv). We keep a mirror in
; variants/crowpanel_dhe04005d/ for organisation but the root copy is what PIO
; actually reads — its path resolver does not like the space in the project
; directory name when combined with ${PROJECT_DIR}.
board_build.partitions = partitions_p4.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DRADIOLIB_STATIC_ONLY=1
  -DRADIOLIB_GODMODE=1

build_src_filter =
  +<*.cpp>
  +<helpers/*.cpp>
  +<helpers/radiolib/*.cpp>
  +<helpers/bridges/BridgeBase.cpp>
  +<helpers/ui/MomentaryButton.cpp>

lib_deps =
  rweather/Crypto @ ^0.4.0
  jgromes/RadioLib @ ^7.3.0
  adafruit/RTClib @ ^2.1.4
  electroniccats/CayenneLPP @ ^1.3.0
  densaugeo/base64 @ ~1.4.0


[CrowPanel_DHE04005D]
extends = esp32p4_base

build_flags =
  ${esp32p4_base.build_flags}
  -I variants/crowpanel_dhe04005d

  ; ---- identify variant ----
  -D CROWPANEL_DHE04005D

  ; ---- MeshCore radio wrapper ----
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper

  ; ---- SX1262 pins (must match variants/crowpanel_dhe04005d/board_config.h) ----
  -D P_LORA_SCLK=26
  -D P_LORA_MISO=47
  -D P_LORA_MOSI=48
  -D P_LORA_NSS=30
  -D P_LORA_DIO_1=31
  -D P_LORA_BUSY=29
  -D P_LORA_RESET=32
  -D SX126X_DIO2_AS_RF_SWITCH=true

  ; Tell MeshCore's ESP32Board::begin() to NOT call Wire.begin() — the STC8
  ; and GT911 are driven via our own i2c_master_bus in variants/…/i2c_bus.cpp
  ; and Arduino's Wire would collide with that claim on I2C port 0.
  -D PIN_BOARD_SDA=-1
  -D PIN_BOARD_SCL=-1

  ; ---- EU Narrow defaults ----
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D LORA_CR=8
  -D LORA_TX_POWER=22

  ; ---- device ----
  -D ADVERT_NAME='"KaA_CrowPanelP4"'
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40

  ; ---- WiFi (via ESP32-C6 over ESP-Hosted on P4). Credentials are now
  ; entered via the Settings → Web Apps → WiFi UI and persisted in NVS —
  ; no compile-time SSID/password. ----

build_src_filter =
  ${esp32p4_base.build_src_filter}
  +<../variants/crowpanel_dhe04005d/*.cpp>

lib_deps =
  ${esp32p4_base.lib_deps}


[env:dhe04005d-5inch-P4-meshcore]
extends = CrowPanel_DHE04005D

; C6 firmware checks / upgrade are handled by a separate selector firmware
; flashed in place of this one; no blob embedding here.

build_flags =
  ${CrowPanel_DHE04005D.build_flags}
  -D FORCE_SX126X_DIO1_ACTION=1
  -DFIRMWARE_VERSION=\"1.15.0-p4\"
  ; Leave RADIOLIB_DEBUG_BASIC on for now so we see radio begin status.
  -D RADIOLIB_DEBUG_BASIC=1
  -I src
  -I src/helpers
  -I src/helpers/radiolib
  -I variants/crowpanel_dhe04005d
  -I examples/crowpanel_p4_lvgl_chat

lib_ldf_mode = chain

build_src_filter =
  ${CrowPanel_DHE04005D.build_src_filter}
  +<../examples/crowpanel_p4_lvgl_chat/*.cpp>
  +<../examples/crowpanel_p4_lvgl_chat/*.c>
  -<../examples/crowpanel_p4_lvgl_chat/main_phase1.cpp.bak>
  +<variants/crowpanel_dhe04005d/*>
  -<examples/>
  -<helpers/AutoDiscoverRTCClock.cpp>

lib_deps =
  ${CrowPanel_DHE04005D.lib_deps}
  file://lib/lvgl
  ; Async HTTP server for the main dashboard (port 80).
  ; me-no-dev/* is unmaintained and hardcodes `pxCurrentTCB`, which was
  ; renamed to `pxCurrentTCBs` when ESP-IDF 5.x moved to SMP FreeRTOS
  ; (required on P4), so those forks fail to link. Use the ESP32Async
  ; community fork which tracks the current FreeRTOS API.
  https://github.com/ESP32Async/AsyncTCP.git
  https://github.com/ESP32Async/ESPAsyncWebServer.git
  ; NOTE: v11 used fhessel/esp32_https_server for the /position endpoint.
  ; That library hardcodes removed-in-IDF-5.x headers (openssl/ssl.h,
  ; hwcrypto/sha.h) and will not compile on P4. web_dashboard.cpp uses
  ; ESP-IDF's built-in esp_https_server component instead (no extra dep).
