; ============================================================
; Dual-Boot Selector — CrowPanel DHE04005D (ESP32-P4)
; ESP32-P4 + ESP-Hosted C6 (WiFi/BT) + 5" 800x480 RGB + GT911 touch
; ============================================================
; ESP32-P4 needs the pioarduino fork — stock platform-espressif32 6.x
; does not support P4. Match the meshcore P4 build's pinned release.

[env:dhe04005d-5inch-P4-selector]
platform   = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
framework  = arduino
board      = esp32-p4-evboard

upload_speed  = 921600
monitor_speed = 115200

board_build.flash_mode  = qio
board_build.f_flash     = 80000000
board_upload.flash_size = 16MB
board_build.partitions  = partitions_dualboot.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -I src

lib_ldf_mode = chain

lib_deps =
    file://lib/lvgl
