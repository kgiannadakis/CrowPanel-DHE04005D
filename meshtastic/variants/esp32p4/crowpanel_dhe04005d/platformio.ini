; ============================================================
; CrowPanel DHE04005D — ESP32-P4 + 5" 800x480 RGB16 + GT911
; ------------------------------------------------------------
; This env is intentionally a SEPARATE platform from the rest of
; Meshtastic's espressif32@6.13.0 builds: stock platform-espressif32
; has no ESP32-P4 support, so we use the pioarduino fork (matches
; what the meshcore P4 build uses).
;
; Known scope of this build (see README.md in this folder):
;   * SX1262 LoRa via custom IDF-native RadioLib HAL (works around
;     Arduino SPIClass MISO routing bug on P4).
;   * WiFi via ESP-Hosted SDIO link to onboard ESP32-C6.
;   * Display: from-scratch LVGL on esp_lcd_panel_rgb (LovyanGFX
;     does not support P4 RGB panels). NOT meshtastic-device-ui.
;   * Bluetooth: DISABLED. P4 has no BT radio; the C6's BT controller
;     is reachable over ESP-Hosted but NimBLE-Arduino doesn't speak
;     hosted controllers.
;   * libpax (WiFi/BLE pax counter) excluded — assumes native radios.
; ============================================================

[esp32p4_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
framework = arduino
; Use pioarduino's bundled P4 EVB board JSON. Our own custom board JSON
; (boards/esp32-p4-crowpanel-dhe04005d.json) does NOT trigger the framework
; build script's sdkconfig.h include-path injection — without that, even
; libc headers like newlib's reent.h fail to compile because they
; #include "sdkconfig.h" unconditionally. Flash size, partitions, and
; MCU options are overridden via board_build / board_upload below so we
; still target the actual 16 MB CrowPanel hardware.
board = esp32-p4-evboard
board_build.f_cpu = 360000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
custom_esp32_kind = esp32p4

extra_scripts =
  ${env.extra_scripts}
  pre:extra_scripts/esp32_pre.py
  extra_scripts/esp32_extra.py

upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct

board_build.partitions = variants/esp32p4/crowpanel_dhe04005d/partitions.csv
board_build.filesystem = littlefs

build_unflags =
  -fno-lto
  -std=c++11
  -std=gnu++11

build_flags =
  ${arduino_base.build_flags}
  -Os
  -std=gnu++17
  -fno-lto
  -Wall
  -Isrc/platform/esp32
  ; ---- Things esp32_common provides that we need verbatim (we don't
  ;       extend esp32_common because it pulls in BLE / libpax / XPowers) ----
  -DSERIAL_BUFFER_SIZE=4096
  -DSERIAL_HAS_ON_RECEIVE
  -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
  -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
  -DESP_OPENSSL_SUPPRESS_LEGACY_WARNING
  ; NOTE: stock espressif32 builds force-include mbedtls/error.h here.
  ; That header transitively pulls in sdkconfig.h via mbedtls/esp_config.h.
  ; pioarduino's P4 layout does not expose sdkconfig.h on the bare include
  ; path for Arduino-managed libraries (Wire, SPI), so the force-include
  ; breaks them. The few Meshtastic TUs that genuinely need
  ; mbedtls_strerror() can include the header explicitly themselves.
  ; ---- P4-specific compile-time gates used in src/ ----
  ; ARCH_ESP32 is defined by src/platform/esp32/architecture.h itself,
  ; pulled in via configuration.h — don't redefine here.
  -DARCH_ESP32P4
  -DCONFIG_IDF_TARGET_ESP32P4
  ; ---- BLE off (P4 has no BT radio) ----
  -DMESHTASTIC_EXCLUDE_BLUETOOTH=1
  -DMESHTASTIC_EXCLUDE_PAXCOUNTER=1
  ; ---- HTTPS web admin off — needs esp32_https_server (HTTPBodyParser etc.)
  ;       which we deliberately omitted from lib_deps. Mesh is reachable via
  ;       the TCP API on the ESP-Hosted WiFi instead.
  -DMESHTASTIC_EXCLUDE_WEBSERVER=1
  ; ---- Auto-TZ (HTTPClient → worldtimeapi.org) off ----
  ; HTTPClient allocates from PSRAM, and on this board the PSRAM heap is
  ; permanently corrupted (TLSF metadata smashed) once esp_lcd_new_rgb_panel()
  ; has grabbed its framebuffers. Symptom: WiFi connects fine, NTP-via-UDP
  ; works, then the first HTTP GET hits `assert failed: block_locate_free
  ; tlsf_control_functions.h:618`. We have a battery-backed DS3231 that
  ; restores wall-clock time at boot and a manual TZ menu in mcui Settings,
  ; so Auto-TZ is dispensable. NTP itself is UDP and stays enabled.
  -DMESHTASTIC_EXCLUDE_TZ=1
  ; ---- MQTT on — uses PubSubClient over WiFiClient (plain TCP, no PSRAM).
  ;       Safe: unlike HTTPClient, PubSubClient does not allocate from SPIRAM.
  ; ---- Input broker + canned messages off — Meshtastic's startup I2C scan
  ;       must not touch Arduino Wire on this board. The working MeshCore
  ;       P4 port keeps the real STC8/GT911/RTC bus on IDF I2C port 0 and
  ;       prevents legacy Wire init from claiming it. Meshtastic's generic
  ;       I2C probing can otherwise false-positive-detect peripherals and
  ;       poll them forever.
  -DMESHTASTIC_EXCLUDE_I2C=1
  -DMESHTASTIC_EXCLUDE_INPUTBROKER=1
  -DMESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  ; ---- WiFi on ----
  -DHAS_WIFI=1
  -DHAS_ETHERNET=0
  -DHAS_UDP_MULTICAST=1
  ; ---- Screen / UI ----
  ; HAS_TFT=1 + USE_MCUI=1 routes tftSetup() into mcui::setup(), which
  ; spawns the UI task that owns LVGL. Our P4-specific display_init()
  ; replacement (variants/.../McDisplayP4.cpp) is what mcui::display_init()
  ; resolves to via the CROWPANEL_DHE04005D gate inside src/graphics/mcui.
  -DHAS_SCREEN=0
  -DHAS_TFT=1
  -DUSE_MCUI=1
  -DDISPLAY_SIZE=800x480
  ; Portrait works via the P4's PPA SRM (Pixel Processing Accelerator's
  ; Scaling/Rotation/Mirroring) hardware: see CrowPanelP4Display.cpp.
  ; LVGL renders at 479×792 in portrait mode and the PPA rotates each
  ; dirty rect 90° CCW into the 800×480 panel framebuffer per flush.
  ; ---- LVGL ----
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_USE_LOG=0
  -DLV_USE_PERF_MONITOR=0
  -DLV_USE_MEM_MONITOR=0
  -DLV_USE_LODEPNG=1
  -DLV_USE_LIBPNG=0
  ; Make LVGL's bundled lodepng.c omit its built-in (lv_malloc) allocators and
  ; instead call the lodepng_malloc/realloc/free in PngDecodeArena.cpp, which
  ; serve lodepng's decode scratch from a private PSRAM arena reserved at boot
  ; (before the framebuffer corrupts the system PSRAM heap). The decoded ARGB8888
  ; output buffer is routed to the same arena via LVGL's image draw-buf handlers.
  ; See PngDecodeArena.cpp for the full rationale.
  -DLODEPNG_NO_COMPILE_ALLOCATORS
  ; LVGL's TLSF heap pool size — read by lv_conf.h as `LV_MEM_SIZE = RAM_SIZE * 1024`.
  ; Default is 96KB, way too small for mcui (chat history, message store, widgets).
  ; The elecrow S3 mcui build uses 6144 KB; we have 32 MB PSRAM so plenty of room.
  ; LVGL's pool comes from heap_caps_aligned_alloc(MALLOC_CAP_SPIRAM) — see lv_conf.h.
  -DRAM_SIZE=6144
  ; ---- RadioLib trim ----
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_STATIC_ONLY=1
  ; ---- App version (normally set by extra_scripts/platformio-custom.py;
  ;       keep explicit fallbacks so configuration.h's #error doesn't trip
  ;       if the script doesn't inject them on this exotic platform) ----
  -DAPP_VERSION=2.7.0-p4
  -DAPP_VERSION_SHORT=2.7.0
  -DAPP_ENV=dhe04005d-5inch-P4-meshtastic
  -DAPP_REPO=meshtastic
  ; MQTT reconnect/connect runs inside Arduino's loop task context
  ; (Meshtastic OSThread scheduler). Increase loop stack headroom to
  ; reduce stack-pressure-induced corruption during hosted TCP connect.
  -DARDUINO_LOOP_STACK_SIZE=16384
  ; platformio-custom.py is supposed to inject USERPREFS_TZ_STRING for every
  ; env via projenv.Append(), and we can see it in the script's "Using flags:"
  ; output — but the flag doesn't reach main.cpp's compile in this env (maybe
  ; SCons project-env isn't being applied to our esp32p4_base for some reason).
  ; Provide a 50-char placeholder so the slipstreamTZString[] literal compiles;
  ; it's overwritten post-flash by the python TZ tooling regardless.
  '-DUSERPREFS_TZ_STRING="tzplaceholder                                         "'
  ; Same story for the default ringtone — script-injected upstream, missing here.
  '-DUSERPREFS_RINGTONE_RTTTL="24:d=32,o=5,b=565:f6,p,f6,4p,p,f6,p,f6,2p,p,b6,p,b6,p,b6,p,b6,p,b,p,b,p,b,p,b,p,b,p,b,p,b,p,b,1p.,2p.,p"'
  ; ---- LoRa pins ----
  ; PIN_SPI_SCK / PIN_SPI_MOSI / PIN_SPI_MISO / LORA_CS / LORA_DIO1 /
  ; LORA_RESET come from board_config.h (verbatim from meshcore). We only
  ; redeclare here the SX126X_* macros that Meshtastic core reads but
  ; meshcore did not need.
  -DUSE_SX1262=1
  -DLORA_SCK=26
  -DLORA_MOSI=48
  -DLORA_MISO=47
  -DLORA_DIO0=-1
  -DSX126X_CS=30
  -DSX126X_DIO1=31
  -DSX126X_BUSY=29
  -DSX126X_RESET=32
  -DSX126X_DIO2_AS_RF_SWITCH=1
  ; SX1262 module on the pinheader has a TCXO. 1.8V is the standard E22-style
  ; voltage and works on this board (radio init OK, real RX confirmed).
  ; TCXO_OPTIONAL falls back to XTAL on init failure for safety.
  -DSX126X_DIO3_TCXO_VOLTAGE=1.8
  -DTCXO_OPTIONAL
  ; ---- Variant-specific includes ----
  -Ivariants/esp32p4/crowpanel_dhe04005d
  -DCROWPANEL_DHE04005D=1
  ; Erase otadata in initVariant() so the bootloader falls back to factory
  ; (the boot selector) on next reboot. Mirrors meshcore's crowpanel_dualboot.cpp.
  -DCROWPANEL_RETURN_TO_BOOT_SELECTOR=1
  ; ESP-Hosted starts a debug CLI during SDIO bring-up. On this P4 Arduino
  ; build it can trip the IDF heap allocator while registering console
  ; commands. We do not need hosted CLI commands for WiFi scan/connect, so
  ; wrap that registration out in EspHostedCliNoop.cpp.
  -Wl,--wrap=esp_console_cmd_register
  ; PSRAM heap is permanently corrupted by esp_lcd_new_rgb_panel() — see
  ; PsramAllocGuard.cpp. Once display_init() arms the guard, any
  ; SPIRAM-only heap_caps_* request from APP-LINKED code is redirected to
  ; internal RAM. (Pre-built IDF libs like lwip and ESP-Hosted bypass the
  ; wrap because their internal calls were resolved at IDF build time —
  ; that's why the phone-app TCP API connect still crashes; see the file
  ; header for the documented limitation.)
  -Wl,--wrap=heap_caps_malloc
  -Wl,--wrap=heap_caps_calloc
  -Wl,--wrap=heap_caps_realloc
  -Wl,--wrap=heap_caps_aligned_alloc
  -Wl,--wrap=free

build_src_filter =
  ${arduino_base.build_src_filter}
  -<platform/nrf52/>
  -<platform/stm32wl>
  -<platform/rp2xx0>
  -<mesh/eth/>
  -<mesh/raspihttp>
  -<nimble/>
  ; The stock LovyanGFX-based mcui McDisplay.cpp was deleted from the tree
  ; (it depended on LGFX_ELECROW70.h which isn't present in this fork);
  ; variants/.../McDisplayP4.cpp now provides the only mcui::display_init()
  ; implementation, talking to esp_lcd_panel_rgb directly.
  +<../variants/esp32p4/crowpanel_dhe04005d/>

lib_ignore =
  segger_rtt
  ESP32 BLE Arduino
  NimBLE-Arduino
  libpax
  LovyanGFX

lib_deps =
  ${arduino_base.lib_deps}
  ${networking_base.lib_deps}
  ${networking_extra.lib_deps}
  ${environmental_base.lib_deps}
  ${environmental_extra_no_bsec.lib_deps}
  ${radiolib_base.lib_deps}
  ; rweather/Crypto provides AES.h consumed by src/mesh/CryptoEngine.h.
  ; (esp32_common pulls this in for us on the S3/OG ESP32 builds, but we
  ; extend arduino_base directly to keep BLE / libpax / XPowersLib out.)
  rweather/Crypto@0.4.0
  ; LVGL 9 — required by mcui (uses lv_screen_load, lv_display_create,
  ; lv_indev_create, lv_obj_remove_flag — all v9 API).
  lvgl/lvgl@^9.2.2

[env:dhe04005d-5inch-P4-meshtastic]
custom_meshtastic_hw_model = 97
custom_meshtastic_hw_model_slug = CROWPANEL_DHE04005D
custom_meshtastic_architecture = esp32-p4
custom_meshtastic_actively_supported = false
custom_meshtastic_support_level = 0
custom_meshtastic_display_name = CrowPanel DHE04005D 5" (P4)
custom_meshtastic_tags = Elecrow,ESP32-P4,experimental
custom_meshtastic_partition_scheme = 16MB
; Dualboot layout: this firmware lives in ota_1 (selector is the factory app,
; meshcore is in ota_0). Tags build artifacts with the right part_name and
; suppresses the unused combined firmware-...factory.bin output.
custom_meshtastic_app_partition = ota_1

extends = esp32p4_base
